<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERPENT — Cursor Snake</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #060612; --surface: #0d0d20; --border: rgba(255,255,255,0.08);
    --green: #39ff9f; --pink: #ff3cac; --blue: #3c8dff; --yellow: #ffe03c;
    --white: #f0f0ff; --dim: rgba(240,240,255,0.45);
  }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--white); font-family:'JetBrains Mono',monospace; cursor:none; }

  #cursor {
    position:fixed; width:16px; height:16px; border:2px solid var(--green);
    border-radius:50%; pointer-events:none; z-index:9999;
    transform:translate(-50%,-50%); transition:background 0.2s, transform 0.1s;
    mix-blend-mode:screen;
  }
  #cursor.eat { background:var(--green); transform:translate(-50%,-50%) scale(2); }

  .bg-orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; animation:drift 12s ease-in-out infinite alternate; }
  .bg-orb.a { width:400px; height:400px; background:rgba(57,255,159,0.07); top:-100px; left:-100px; }
  .bg-orb.b { width:500px; height:500px; background:rgba(255,60,172,0.06); bottom:-150px; right:-100px; animation-delay:-5s; }
  .bg-orb.c { width:300px; height:300px; background:rgba(60,141,255,0.07); top:40%; left:50%; animation-delay:-9s; }
  @keyframes drift { from{transform:translate(0,0) scale(1);} to{transform:translate(40px,30px) scale(1.1);} }

  /* SCREENS */
  .screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; opacity:0; pointer-events:none; transition:opacity 0.4s; }
  .screen.active { opacity:1; pointer-events:all; }

  /* START */
  #startScreen { background:radial-gradient(ellipse at 50% 40%, rgba(57,255,159,0.07) 0%, transparent 70%), var(--bg); }
  .logo {
    font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(56px,10vw,96px);
    letter-spacing:-2px; line-height:1;
    background:linear-gradient(135deg,var(--green) 0%,var(--blue) 50%,var(--pink) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:12px; animation:lglow 3s ease-in-out infinite alternate;
  }
  @keyframes lglow { from{filter:drop-shadow(0 0 20px rgba(57,255,159,0.3));} to{filter:drop-shadow(0 0 40px rgba(255,60,172,0.4));} }
  .tagline { font-size:13px; letter-spacing:6px; color:var(--dim); text-transform:uppercase; margin-bottom:56px; }
  .hints { display:flex; gap:20px; margin-bottom:56px; flex-wrap:wrap; justify-content:center; }
  .hint { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; padding:20px 22px; text-align:center; width:150px; backdrop-filter:blur(10px); }
  .hint .icon { font-size:26px; margin-bottom:10px; }
  .hint .lbl { font-size:12px; color:var(--dim); line-height:1.5; }
  .start-btn {
    position:relative; padding:18px 64px; font-family:'Syne',sans-serif; font-size:18px; font-weight:700;
    letter-spacing:3px; text-transform:uppercase; color:var(--bg); background:var(--green);
    border:none; border-radius:60px; cursor:none; overflow:hidden;
    transition:transform 0.2s,box-shadow 0.3s;
    box-shadow:0 0 40px rgba(57,255,159,0.35),0 0 80px rgba(57,255,159,0.1);
  }
  .start-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent); transform:translateX(-100%); animation:shimmer 2.5s ease-in-out infinite; }
  @keyframes shimmer { to{transform:translateX(100%);} }
  .start-btn:hover { transform:scale(1.06); box-shadow:0 0 60px rgba(57,255,159,0.55),0 0 120px rgba(57,255,159,0.2); }
  .start-btn:active { transform:scale(0.97); }

  /* GAME */
  #gameScreen { background:transparent; pointer-events:none; }
  #gameCanvas { display:block; border-radius:16px; border:1px solid rgba(57,255,159,0.15); box-shadow:0 0 60px rgba(57,255,159,0.08),0 0 120px rgba(255,60,172,0.04); }

  /* HUD */
  #hud {
    position:fixed; top:24px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:28px;
    background:rgba(13,13,32,0.88); border:1px solid var(--border);
    border-radius:50px; padding:12px 28px; backdrop-filter:blur(20px);
    z-index:200; opacity:0; transition:opacity 0.4s; pointer-events:none;
  }
  #hud.on { opacity:1; pointer-events:all; }
  .hstat { display:flex; align-items:center; gap:10px; }
  .hlabel { font-size:10px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; }
  .hval { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:var(--white); min-width:36px; transition:color 0.2s; }
  .hval.bump { animation:bump 0.3s ease; }
  @keyframes bump { 0%,100%{transform:scale(1);} 50%{transform:scale(1.5); color:var(--green);} }
  .hdiv { width:1px; height:24px; background:var(--border); }
  .hbtn { background:transparent; border:1px solid var(--border); border-radius:20px; padding:6px 16px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--dim); cursor:none; transition:all 0.2s; letter-spacing:1px; }
  .hbtn:hover { border-color:var(--green); color:var(--green); background:rgba(57,255,159,0.06); }

  /* PAUSE overlay */
  #pauseOv { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:300; pointer-events:none; opacity:0; transition:opacity 0.3s; }
  #pauseOv.on { opacity:1; }
  .pbadge { font-family:'Syne',sans-serif; font-size:80px; font-weight:800; color:var(--white); opacity:0.06; letter-spacing:10px; pointer-events:none; user-select:none; }

  /* GAME OVER */
  #gameOverScreen { background:radial-gradient(ellipse at 50% 40%,rgba(255,60,172,0.08) 0%,transparent 70%),rgba(6,6,18,0.97); backdrop-filter:blur(20px); }
  .over-title { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(48px,8vw,80px); letter-spacing:-1px; color:var(--pink); margin-bottom:8px; filter:drop-shadow(0 0 30px rgba(255,60,172,0.5)); }
  .over-sub { font-size:12px; letter-spacing:4px; color:var(--dim); text-transform:uppercase; margin-bottom:50px; }
  .over-stats { display:flex; gap:32px; margin-bottom:52px; flex-wrap:wrap; justify-content:center; }
  .ostat { text-align:center; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:20px 28px; }
  .ostat-val { font-family:'Syne',sans-serif; font-size:40px; font-weight:800; background:linear-gradient(135deg,var(--green),var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .ostat-lbl { font-size:11px; color:var(--dim); letter-spacing:2px; text-transform:uppercase; margin-top:6px; }
  .over-btns { display:flex; gap:16px; }
  .obtn { padding:14px 48px; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; border-radius:50px; border:2px solid; cursor:none; transition:all 0.25s; }
  .obtn.p { background:var(--green); border-color:var(--green); color:var(--bg); box-shadow:0 0 40px rgba(57,255,159,0.3); }
  .obtn.p:hover { box-shadow:0 0 60px rgba(57,255,159,0.5); transform:scale(1.04); }
  .obtn.s { background:transparent; border-color:rgba(255,255,255,0.15); color:var(--dim); }
  .obtn.s:hover { border-color:var(--pink); color:var(--pink); }

  /* Score popup */
  .spop { position:fixed; font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:var(--green); pointer-events:none; z-index:500; animation:floatup 0.9s ease-out forwards; text-shadow:0 0 20px rgba(57,255,159,0.8); }
  @keyframes floatup { 0%{opacity:1;transform:translateY(0) scale(1);} 60%{opacity:1;transform:translateY(-40px) scale(1.2);} 100%{opacity:0;transform:translateY(-70px) scale(0.8);} }
</style>
</head>
<body>

<div id="cursor"></div>
<div class="bg-orb a"></div>
<div class="bg-orb b"></div>
<div class="bg-orb c"></div>

<!-- HUD -->
<div id="hud">
  <div class="hstat"><span class="hlabel">Score</span><span class="hval" id="hScore">0</span></div>
  <div class="hdiv"></div>
  <div class="hstat"><span class="hlabel">Length</span><span class="hval" id="hLen">3</span></div>
  <div class="hdiv"></div>
  <div class="hstat"><span class="hlabel">Best</span><span class="hval" id="hBest">0</span></div>
  <div class="hdiv"></div>
  <button class="hbtn" id="pauseBtn" onclick="togglePause()">PAUSE</button>
</div>

<div id="pauseOv"><div class="pbadge">PAUSED</div></div>

<!-- START -->
<div class="screen active" id="startScreen">
  <div class="logo">SERPENT</div>
  <div class="tagline">cursor-controlled snake</div>
  <div class="hints">
    <div class="hint"><div class="icon">🖱️</div><div class="lbl">Move cursor to steer</div></div>
    <div class="hint"><div class="icon">💎</div><div class="lbl">Eat gems to grow</div></div>
    <div class="hint"><div class="icon">⚡</div><div class="lbl">Speed up as you score</div></div>
    <div class="hint"><div class="icon">💀</div><div class="lbl">Don't bite yourself!</div></div>
  </div>
  <button class="start-btn" id="startBtn">PLAY NOW</button>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- GAME OVER -->
<div class="screen" id="gameOverScreen">
  <div class="over-title">DEAD.</div>
  <div class="over-sub">you bit yourself</div>
  <div class="over-stats">
    <div class="ostat"><div class="ostat-val" id="oScore">0</div><div class="ostat-lbl">Score</div></div>
    <div class="ostat"><div class="ostat-val" id="oLen">0</div><div class="ostat-lbl">Length</div></div>
    <div class="ostat"><div class="ostat-val" id="oBest">0</div><div class="ostat-lbl">Best</div></div>
  </div>
  <div class="over-btns">
    <button class="obtn p" onclick="restartGame()">PLAY AGAIN</button>
    <button class="obtn s" onclick="goHome()">MENU</button>
  </div>
</div>

<script>
// ── CURSOR ──────────────────────────────────────────────────
const curEl = document.getElementById('cursor');
let mx = window.innerWidth/2, my = window.innerHeight/2;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  curEl.style.left = mx+'px'; curEl.style.top = my+'px';
});

// ── SCREENS ─────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── CANVAS ──────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const CELL   = 24, COLS = 25, ROWS = 25;
canvas.width = COLS*CELL; canvas.height = ROWS*CELL;

// ── STATE ───────────────────────────────────────────────────
let snake, food, dir, score, best=0, speed, lastStep, paused, alive, running, rafId, foodTick=0;

function initState() {
  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  snake = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir   = {x:1,y:0};
  score = 0; speed = 130; // ms per step (lower = faster)
  paused = false; alive = true; running = true;
  lastStep = performance.now();
  placeFood();
  refreshHUD();
}

function placeFood() {
  let p;
  do { p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s=>s.x===p.x&&s.y===p.y));
  food = p;
}

// ── CURSOR → DIRECTION ──────────────────────────────────────
function desiredDir() {
  const rect  = canvas.getBoundingClientRect();
  const sx    = canvas.width  / rect.width;
  const sy    = canvas.height / rect.height;
  const cx    = (mx - rect.left) * sx;
  const cy    = (my - rect.top)  * sy;
  const hx    = snake[0].x * CELL + CELL/2;
  const hy    = snake[0].y * CELL + CELL/2;
  const dx    = cx - hx, dy = cy - hy;
  if (Math.abs(dx) < CELL/2 && Math.abs(dy) < CELL/2) return null;
  return Math.abs(dx) >= Math.abs(dy)
    ? (dx>0 ? {x:1,y:0} : {x:-1,y:0})
    : (dy>0 ? {x:0,y:1} : {x:0,y:-1});
}

// ── GAME LOOP ────────────────────────────────────────────────
function loop(now) {
  if (!running) return;
  rafId = requestAnimationFrame(loop);
  draw();
  if (paused || !alive) return;
  if (now - lastStep >= speed) {
    lastStep = now;
    step();
  }
}

function step() {
  const d = desiredDir();
  if (d && !(d.x===-dir.x && d.y===-dir.y)) dir = d;

  const head = snake[0];
  const nh   = { x:(head.x+dir.x+COLS)%COLS, y:(head.y+dir.y+ROWS)%ROWS };

  // Self collision (skip neck segment)
  if (snake.slice(2).some(s=>s.x===nh.x&&s.y===nh.y)) { die(); return; }

  snake.unshift(nh);
  if (nh.x===food.x && nh.y===food.y) {
    score += 10;
    speed  = Math.max(55, 130 - Math.floor(score/30)*8);
    if (score>best) best=score;
    placeFood();
    spawnPopup(nh);
    bump('hScore'); bump('hLen');
    curEl.classList.add('eat');
    setTimeout(()=>curEl.classList.remove('eat'),300);
  } else {
    snake.pop();
  }
  refreshHUD();
}

// ── DRAW ────────────────────────────────────────────────────
function draw() {
  foodTick += 0.07;
  ctx.fillStyle = '#060612';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grid dots
  for (let x=0;x<COLS;x++) for (let y=0;y<ROWS;y++) {
    ctx.fillStyle='rgba(255,255,255,0.028)';
    ctx.beginPath(); ctx.arc(x*CELL+CELL/2,y*CELL+CELL/2,1,0,Math.PI*2); ctx.fill();
  }

  drawFood();
  if (snake) drawSnake();
}

function drawFood() {
  const fx=food.x*CELL+CELL/2, fy=food.y*CELL+CELL/2;
  const pulse=Math.sin(foodTick)*0.22+0.78;
  const r=CELL*0.37*pulse;

  // Glow
  const g=ctx.createRadialGradient(fx,fy,0,fx,fy,r*3);
  g.addColorStop(0,'rgba(255,224,60,0.28)'); g.addColorStop(1,'rgba(255,224,60,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(fx,fy,r*3,0,Math.PI*2); ctx.fill();

  // Diamond
  ctx.save(); ctx.translate(fx,fy); ctx.rotate(foodTick*0.55);
  ctx.fillStyle='#ffe03c'; ctx.shadowColor='#ffe03c'; ctx.shadowBlur=18;
  ctx.beginPath();
  ctx.moveTo(0,-r); ctx.lineTo(r*0.62,0); ctx.lineTo(0,r); ctx.lineTo(-r*0.62,0);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
}

function drawSnake() {
  for (let i=snake.length-1;i>=0;i--) {
    const s=snake[i], t=1-i/snake.length;
    const x=s.x*CELL, y=s.y*CELL;
    const pad=i===0?1:3, sz=CELL-pad*2, rad=i===0?6:4;

    if (i===0) {
      ctx.shadowColor='#39ff9f'; ctx.shadowBlur=22; ctx.fillStyle='#39ff9f';
    } else {
      const hue=155-t*60, lt=48+t*15, al=0.38+t*0.55;
      ctx.shadowColor=`hsla(${hue},100%,${lt}%,0.45)`; ctx.shadowBlur=8;
      ctx.fillStyle=`hsla(${hue},88%,${lt}%,${al})`;
    }
    rr(x+pad,y+pad,sz,sz,rad); ctx.fill(); ctx.shadowBlur=0;

    if (i===0) {
      // Highlight
      ctx.fillStyle='rgba(255,255,255,0.28)';
      rr(x+pad+3,y+pad+2,sz*0.42,sz*0.26,3); ctx.fill();
      // Eyes
      ctx.fillStyle='#060612';
      const e=3;
      if(dir.x===1)  { ctx.fillRect(x+CELL-7,y+5,e,e); ctx.fillRect(x+CELL-7,y+CELL-8,e,e); }
      if(dir.x===-1) { ctx.fillRect(x+4,y+5,e,e);      ctx.fillRect(x+4,y+CELL-8,e,e); }
      if(dir.y===1)  { ctx.fillRect(x+5,y+CELL-7,e,e); ctx.fillRect(x+CELL-8,y+CELL-7,e,e); }
      if(dir.y===-1) { ctx.fillRect(x+5,y+4,e,e);      ctx.fillRect(x+CELL-8,y+4,e,e); }
    }
  }
}

function rr(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ── HUD ─────────────────────────────────────────────────────
function refreshHUD() {
  document.getElementById('hScore').textContent = score;
  document.getElementById('hLen').textContent   = snake.length;
  document.getElementById('hBest').textContent  = best;
}

function bump(id) {
  const el=document.getElementById(id);
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
}

// ── POPUP ────────────────────────────────────────────────────
function spawnPopup(cell) {
  const rect=canvas.getBoundingClientRect();
  const sx=rect.width/canvas.width, sy=rect.height/canvas.height;
  const px=rect.left+(cell.x*CELL+CELL/2)*sx;
  const py=rect.top +cell.y*CELL*sy;
  const el=document.createElement('div');
  el.className='spop'; el.textContent='+10';
  el.style.left=px+'px'; el.style.top=py+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

// ── PAUSE ────────────────────────────────────────────────────
function togglePause() {
  if(!running||!alive) return;
  paused=!paused;
  document.getElementById('pauseOv').classList.toggle('on',paused);
  document.getElementById('pauseBtn').textContent=paused?'RESUME':'PAUSE';
}
document.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();togglePause();} });

// ── DEATH ────────────────────────────────────────────────────
function die() {
  alive=false; running=false;
  if(score>best) best=score;
  setTimeout(()=>{
    document.getElementById('hud').classList.remove('on');
    document.getElementById('pauseOv').classList.remove('on');
    document.getElementById('oScore').textContent=score;
    document.getElementById('oLen').textContent=snake.length;
    document.getElementById('oBest').textContent=best;
    showScreen('gameOverScreen');
  },500);
}

// ── FLOW ─────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startGame);

function startGame() {
  showScreen('gameScreen');
  document.getElementById('hud').classList.add('on');
  document.getElementById('pauseBtn').textContent='PAUSE';
  if(rafId) cancelAnimationFrame(rafId);
  initState();
  requestAnimationFrame(loop);
}

function restartGame() {
  showScreen('gameScreen');
  document.getElementById('hud').classList.add('on');
  document.getElementById('pauseBtn').textContent='PAUSE';
  if(rafId) cancelAnimationFrame(rafId);
  initState();
  requestAnimationFrame(loop);
}

function goHome() {
  running=false;
  if(rafId) cancelAnimationFrame(rafId);
  document.getElementById('hud').classList.remove('on');
  showScreen('startScreen');
}
</script>
</body>
</html>
